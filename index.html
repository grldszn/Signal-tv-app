<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuner — Live TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
:root {
  --bg: #0c0d12;
  --surface-1: #13141b;
  --surface-2: #1a1b24;
  --surface-3: #22232f;
  --surface-4: #2a2b39;
  --border: rgba(255,255,255,0.07);
  --border-mid: rgba(255,255,255,0.11);
  --border-hi: rgba(255,255,255,0.18);
  --text: #f0f1f5;
  --text-2: #9899a8;
  --text-3: #5a5b6a;
  --live: #ff3f3f;
  --live-glow: rgba(255,63,63,0.35);
  --signal: #00e5a0;
  --signal-dim: rgba(0,229,160,0.12);
  --signal-glow: rgba(0,229,160,0.25);
  --warn: #f59e0b;
  --r: 10px;
  --r-sm: 7px;
  --r-lg: 14px;
  --font-ui: 'Sora', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --shadow: 0 20px 60px -16px rgba(0,0,0,0.8);
  --shadow-sm: 0 4px 16px -4px rgba(0,0,0,0.5);
  --transition: 140ms cubic-bezier(0.25,0.46,0.45,0.94);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 900px 500px at 60% -10%, rgba(0,229,160,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 600px 400px at -10% 60%, rgba(0,150,100,0.03) 0%, transparent 70%);
  z-index: 0;
}
* { position: relative; z-index: 1; }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, select { font-family: inherit; }
:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; border-radius: 4px; }
::selection { background: var(--signal); color: #031a10; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 4px; }

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px;
  height: 58px;
  background: rgba(12,13,18,0.92);
  backdrop-filter: blur(16px) saturate(1.4);
  border-bottom: 1px solid var(--border);
}

/* ── Logo ── */
.logo { display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
.logo-mark {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: #0a1a14;
  border: 1px solid rgba(0,229,160,0.25);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(0,229,160,0.08) inset, 0 0 16px rgba(0,229,160,0.1);
}
.logo-mark::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 30%, rgba(0,229,160,0.15), transparent 70%);
}
.logo-mark svg { width: 18px; height: 18px; }
.logo-wordmark {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.3px;
  color: var(--text);
}
.logo-wordmark em {
  font-style: normal;
  color: var(--signal);
}
.logo-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 2px 6px;
  border: 1px solid var(--border-mid);
  border-radius: 4px;
  align-self: flex-end;
  margin-bottom: 3px;
}

.topbar-divider { width: 1px; height: 22px; background: var(--border-mid); flex-shrink: 0; }

/* ── Search ── */
.search-wrap { flex: 1; max-width: 400px; position: relative; }
.search-wrap svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; color: var(--text-3); pointer-events: none;
}
#searchInput {
  width: 100%;
  background: var(--surface-1);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 999px;
  padding: 9px 36px 9px 36px;
  font-size: 13.5px;
  transition: border-color var(--transition), background var(--transition);
}
#searchInput::placeholder { color: var(--text-3); }
#searchInput:focus { border-color: rgba(0,229,160,0.3); background: var(--surface-2); outline: none; }
.search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--surface-3); color: var(--text-2);
  display: none; align-items: center; justify-content: center; font-size: 11px;
}
.search-clear.show { display: flex; }

.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: auto; }

.playlist-select {
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 7px 12px;
  font-size: 12.5px; max-width: 180px;
  font-family: var(--font-body);
  cursor: pointer;
}

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 500; font-family: var(--font-body);
  border: 1px solid var(--border-mid);
  background: var(--surface-2); color: var(--text);
  transition: background var(--transition), border-color var(--transition), transform var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--surface-3); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn-primary {
  background: var(--signal); color: #031a10; border-color: var(--signal);
  font-weight: 600;
}
.btn-primary:hover { background: #00f0aa; }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--surface-2); }

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
.layout { display: flex; flex: 1; min-height: 0; }

/* ── Sidebar ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surface-1);
  border-right: 1px solid var(--border);
  padding: 16px 10px;
  position: sticky; top: 58px;
  height: calc(100vh - 58px);
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 20px;
}

.nav-section-label {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-3); padding: 0 8px 6px;
}
.nav-group { display: flex; flex-direction: column; gap: 1px; }

.nav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 8px;
  font-size: 13.5px; font-weight: 500; color: var(--text-2);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  border: 1px solid transparent;
  gap: 8px;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active {
  background: var(--surface-3); color: var(--text);
  border-color: var(--border-mid);
}
.nav-item.active .nav-count {
  color: var(--signal);
  border-color: rgba(0,229,160,0.25);
}
.nav-item-left { display: flex; align-items: center; gap: 9px; overflow: hidden; }
.nav-item-left svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.75; }
.nav-item-left span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-count {
  font-family: var(--font-mono); font-size: 10.5px;
  color: var(--text-3); border: 1px solid var(--border);
  border-radius: 5px; padding: 1px 6px; flex-shrink: 0;
}

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
.main { flex: 1; min-width: 0; padding: 20px 22px 60px; display: flex; flex-direction: column; gap: 20px; }

/* ═══════════════════════════════════════
   PLAYER
═══════════════════════════════════════ */
.player-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.player-stage {
  position: relative;
  width: 100%; aspect-ratio: 16/9;
  background: #070810;
  display: flex; align-items: center; justify-content: center;
}
.player-stage video {
  width: 100%; height: 100%;
  object-fit: contain;
  background: #000;
  display: none;
}

/* Empty state */
.player-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; color: var(--text-3); text-align: center; padding: 40px;
  position: absolute; inset: 0;
}
.player-empty-icon {
  width: 56px; height: 56px; border-radius: 14px;
  background: var(--surface-2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
}
.player-empty-icon svg { width: 26px; height: 26px; color: var(--text-3); }
.player-empty h3 { font-family: var(--font-ui); font-size: 16px; font-weight: 600; color: var(--text-2); }
.player-empty p { font-size: 13px; color: var(--text-3); max-width: 280px; }

/* Stage overlays */
.stage-overlay {
  position: absolute; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; background: rgba(7,8,16,0.82); text-align: center; padding: 24px;
}
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.1);
  border-top-color: var(--signal);
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-title { font-family: var(--font-ui); font-size: 16px; font-weight: 600; color: var(--text); }
.overlay-detail { font-size: 12.5px; color: var(--text-2); max-width: 320px; line-height: 1.6; }

/* Live badge */
.live-badge {
  position: absolute; top: 12px; left: 12px; z-index: 8;
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,63,63,0.3);
  border-radius: 999px; padding: 4px 10px 4px 8px;
  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.06em; color: var(--text);
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--live);
  box-shadow: 0 0 6px var(--live-glow);
  animation: livepulse 1.6s ease-in-out infinite;
}
@keyframes livepulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* Tuning flicker */
.tuning::after {
  content: '';
  position: absolute; inset: 0; z-index: 9; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 3px);
  animation: tuneflicker 0.4s steps(3) forwards;
}
@keyframes tuneflicker {
  0% { opacity: 1; } 60% { opacity: 0.4; } 100% { opacity: 0; }
}

/* ── Control Bar ── */
.control-bar {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 8;
  display: none;
  align-items: center; gap: 10px;
  padding: 12px 14px;
  background: linear-gradient(to top, rgba(4,5,10,0.95), rgba(4,5,10,0.6) 60%, transparent);
  transition: opacity 0.22s ease;
}
.control-bar.visible { display: flex; }
.control-bar.hidden-bar { opacity: 0; pointer-events: none; }

.ctrl-btn {
  width: 32px; height: 32px; border-radius: 7px;
  color: var(--text); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background var(--transition), color var(--transition);
}
.ctrl-btn:hover { background: rgba(255,255,255,0.12); color: var(--signal); }
.ctrl-btn svg { width: 17px; height: 17px; }

.vol-group { display: flex; align-items: center; gap: 7px; }
.vol-slider {
  width: 72px; height: 3px; -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.2); border-radius: 999px; cursor: pointer; outline: none;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: var(--signal);
  box-shadow: 0 0 0 3px rgba(0,229,160,0.2);
}
.vol-slider::-moz-range-thumb {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--signal); border: none;
}

.ctrl-spacer { flex: 1; }

/* Quality selector in control bar */
.quality-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
  color: var(--text); border-radius: 6px; padding: 5px 9px;
  font-family: var(--font-mono); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: background var(--transition);
  position: relative;
}
.quality-btn:hover { background: rgba(255,255,255,0.14); }
.quality-btn svg { width: 12px; height: 12px; }

/* Quality dropdown popup */
.quality-popup {
  position: absolute; bottom: calc(100% + 8px); right: 0;
  background: var(--surface-3); border: 1px solid var(--border-mid);
  border-radius: 10px; padding: 6px;
  min-width: 120px;
  box-shadow: var(--shadow);
  display: none; flex-direction: column; gap: 2px;
  z-index: 20;
}
.quality-popup.open { display: flex; }
.quality-option {
  padding: 7px 10px; border-radius: 6px;
  font-family: var(--font-mono); font-size: 12px; color: var(--text-2);
  cursor: pointer; transition: background var(--transition), color var(--transition);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.quality-option:hover { background: var(--surface-4); color: var(--text); }
.quality-option.active { color: var(--signal); }
.quality-option.active::after {
  content: '';
  width: 6px; height: 6px; border-radius: 50%; background: var(--signal);
}

/* ── Player Meta Bar ── */
.player-meta {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px;
  border-top: 1px solid var(--border);
}
.meta-logo {
  width: 42px; height: 42px; border-radius: 9px;
  object-fit: contain; background: var(--surface-2);
  border: 1px solid var(--border); flex-shrink: 0;
}
.meta-info { flex: 1; min-width: 0; }
.meta-name {
  font-family: var(--font-ui); font-weight: 600; font-size: 15px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.meta-group { font-size: 12px; color: var(--text-3); margin-top: 1px; }
.meta-epg { font-size: 11.5px; color: var(--signal); margin-top: 3px; display: none; }
.meta-epg.show { display: block; }
.meta-actions { display: flex; gap: 7px; flex-shrink: 0; }

.icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface-2);
  color: var(--text-2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background var(--transition), color var(--transition), border-color var(--transition);
}
.icon-btn:hover { background: var(--surface-3); color: var(--text); }
.icon-btn.fav-active { color: var(--warn); border-color: rgba(245,158,11,0.3); }
.icon-btn svg { width: 15px; height: 15px; }

/* ═══════════════════════════════════════
   EPG PANEL (Now / Up Next / Passed)
═══════════════════════════════════════ */
.epg-panel {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.epg-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.epg-header svg { width: 16px; height: 16px; color: var(--signal); }
.epg-header-title {
  font-family: var(--font-ui); font-weight: 600; font-size: 14px;
}
.epg-header-sub { font-size: 12px; color: var(--text-3); margin-left: auto; }
.epg-refresh-btn {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-3); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: color var(--transition), background var(--transition);
}
.epg-refresh-btn:hover { color: var(--signal); background: var(--surface-3); }
.epg-refresh-btn svg { width: 13px; height: 13px; }

.epg-timeline { display: flex; flex-direction: column; }
.epg-section-label {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-3);
  padding: 10px 18px 6px;
  background: var(--surface-1);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.epg-section-label::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
}
.epg-section-label.past::before { background: var(--surface-4); }
.epg-section-label.now::before { background: var(--live); box-shadow: 0 0 6px var(--live-glow); }
.epg-section-label.next::before { background: var(--signal); box-shadow: 0 0 6px var(--signal-glow); }

.epg-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
}
.epg-item:last-child { border-bottom: none; }
.epg-item:hover { background: var(--surface-2); }
.epg-item.now { background: rgba(0,229,160,0.04); }
.epg-item.past { opacity: 0.55; }
.epg-time {
  font-family: var(--font-mono); font-size: 11.5px; color: var(--text-3);
  white-space: nowrap; min-width: 76px; padding-top: 2px;
}
.epg-item.now .epg-time { color: var(--signal); }
.epg-title { font-size: 13.5px; font-weight: 500; color: var(--text); flex: 1; }
.epg-item.past .epg-title { color: var(--text-2); }
.epg-duration {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  white-space: nowrap;
}
.epg-now-tag {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--live);
  border: 1px solid rgba(255,63,63,0.3);
  border-radius: 4px; padding: 2px 5px;
  flex-shrink: 0;
}
.epg-progress-bar {
  width: 100%; height: 3px; background: var(--surface-3);
  border-radius: 999px; margin-top: 6px; overflow: hidden;
}
.epg-progress-fill {
  height: 100%; background: var(--signal);
  border-radius: 999px;
  transition: width 60s linear;
}
.epg-empty {
  padding: 28px 18px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  color: var(--text-3); text-align: center;
}
.epg-empty svg { width: 32px; height: 32px; opacity: 0.4; }
.epg-empty p { font-size: 12.5px; }
.epg-empty .epg-note { font-size: 11.5px; color: var(--text-3); }

/* ═══════════════════════════════════════
   CHANNEL BROWSER
═══════════════════════════════════════ */
.browser-header {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.browser-title {
  font-family: var(--font-ui); font-weight: 700; font-size: 18px; letter-spacing: -0.2px;
}
.browser-count {
  font-family: var(--font-mono); font-size: 11.5px; color: var(--text-3);
  margin-left: 8px;
}

.chip-row {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
}
.chip {
  flex-shrink: 0; font-size: 12.5px; font-weight: 500;
  color: var(--text-2); background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 999px;
  padding: 5px 12px; cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}
.chip:hover { color: var(--text); border-color: var(--border-mid); }
.chip.active {
  background: var(--signal); color: #031a10;
  border-color: var(--signal); font-weight: 600;
}

/* ── Channel Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 12px;
}
.card {
  position: relative;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px;
  cursor: pointer;
  transition: transform var(--transition), border-color var(--transition), background var(--transition), box-shadow var(--transition);
}
.card:hover {
  transform: translateY(-3px);
  border-color: var(--border-hi);
  background: var(--surface-2);
  box-shadow: var(--shadow-sm);
}
.card.now-playing {
  border-color: var(--signal);
  box-shadow: 0 0 0 1px var(--signal) inset, 0 0 20px rgba(0,229,160,0.12);
}

.card-thumb {
  position: relative;
  width: 100%; aspect-ratio: 3/2;
  background: var(--surface-2); border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; margin-bottom: 9px;
  border: 1px solid var(--border);
}
.card-thumb img { width: 68%; height: 68%; object-fit: contain; }
.card-thumb img.logo-fallback { width: 36%; height: 36%; opacity: 0.35; }
.ch-num {
  position: absolute; bottom: 5px; left: 5px;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  background: rgba(0,0,0,0.55); border-radius: 4px; padding: 1px 5px;
}
.play-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity var(--transition);
}
.card:hover .play-overlay { opacity: 1; }
.play-overlay svg { width: 24px; height: 24px; color: #fff; }

.star-btn {
  position: absolute; top: 6px; right: 6px;
  width: 26px; height: 26px; border-radius: 6px;
  background: rgba(0,0,0,0.5); color: var(--text-3);
  display: flex; align-items: center; justify-content: center;
  z-index: 2; transition: color var(--transition), background var(--transition);
}
.star-btn:hover { background: rgba(0,0,0,0.75); color: var(--warn); }
.star-btn.active { color: var(--warn); }
.star-btn svg { width: 13px; height: 13px; }

.card-name {
  font-size: 12.5px; font-weight: 600; line-height: 1.35;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-group {
  font-size: 11px; color: var(--text-3); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-playing-indicator {
  display: none;
  position: absolute; top: 6px; left: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--signal); box-shadow: 0 0 6px var(--signal-glow);
}
.card.now-playing .card-playing-indicator { display: block; }

/* Skeleton */
.skel {
  background: linear-gradient(100deg, var(--surface-1) 30%, var(--surface-3) 50%, var(--surface-1) 70%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skel-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r); padding: 10px; }
.skel-thumb { aspect-ratio: 3/2; border-radius: var(--r-sm); margin-bottom: 9px; }
.skel-line { height: 9px; border-radius: 4px; margin-bottom: 6px; }

/* Empty / Error states */
.empty-state {
  grid-column: 1/-1;
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; padding: 64px 20px; color: var(--text-3); text-align: center;
}
.empty-state svg { width: 38px; height: 38px; opacity: 0.4; }
.empty-state h3 { font-family: var(--font-ui); font-size: 15px; color: var(--text-2); font-weight: 600; }
.empty-state p { font-size: 13px; max-width: 320px; }

.load-more-wrap { display: flex; justify-content: center; padding: 24px 0 4px; }
.sentinel { height: 1px; }

/* ── Fetch error ── */
.fetch-error {
  display: flex; gap: 14px; align-items: flex-start;
  background: #1a0f0f; border: 1px solid rgba(255,63,63,0.2);
  border-radius: var(--r); padding: 16px 18px;
}
.fetch-error .fe-icon { color: var(--live); flex-shrink: 0; }
.fetch-error .fe-icon svg { width: 20px; height: 20px; margin-top: 1px; }
.fe-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.fe-detail { font-size: 12.5px; color: var(--text-2); line-height: 1.6; }
.fe-actions { margin-top: 12px; display: flex; gap: 8px; }

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(4,5,10,0.75); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {

.modal-sub { font-size: 13px; color: var(--text-3); margin-bottom: 20px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11.5px; color: var(--text-3); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.02em; }
.field input {

}
.field input:focus { outline: none; border-color: rgba(0,229,160,0.35); }
.field-error { color: var(--live); font-size: 12px; margin-top: 5px; display: none; }
.field-error.show { display: block; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
.playlist-list { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 14px; }
.pl-list-title {

}
.pl-row {

  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.pl-row:last-child { border-bottom: none; }
.pl-name { font-size: 13px; font-weight: 600; }
.pl-url { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pl-builtin { font-family: var(--font-mono); font-size: 9.5px; color: var(--signal); border: 1px solid rgba(0,229,160,0.25); border-radius: 4px; padding: 1px 5px; margin-left: 6px; }
.pl-actions { display: flex; gap: 6px; }
.pl-actions button { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 12px; padding: 4px 6px; border-radius: 5px; transition: color var(--transition), background var(--transition); }
.pl-actions button:hover { color: var(--text); background: var(--surface-3); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; z-index: 300;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface-3); border: 1px solid var(--border-mid);
  color: var(--text); padding: 10px 18px;
  border-radius: 999px; font-size: 13px;
  box-shadow: var(--shadow-sm); opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Mobile tabs ── */

/* ═══════════════════════════════════════

<script>
(function(){
'use strict';

/* ─────────────── constants ─────────────── */
var DEFAULT_PLAYLIST = {
  id: 'default',
  name: 'IPTV-ORG (Full Index)',
  url: 'https://iptv-org.github.io/iptv/index.m3u',
  builtIn: true
};
var BATCH_SIZE = 48;
var RECENT_MAX = 15;
var TIMEOUT_MS = 22000;   // 22 s before giving up
var RETRY_DELAY_MS = 1200;
var MAX_RETRIES = 3;

var FALLBACK_SVG = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%235a5b6a" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M10 11l5 2.5-5 2.5V11z" fill="%235a5b6a" stroke="none"/></svg>'
);

/* ─────────────── state ─────────────── */
var state = {
  playlists: [DEFAULT_PLAYLIST],
  activePlaylistId: 'default',
  channels: [],
  categories: [],
  favorites: [],
  recent: [],
  tab: 'all',
  query: '',
  renderedCount: 0,
  filtered: [],
  current: null,
  loadingPlaylist: true,
  playlistError: null,
  hls: null,
  statusTimeout: null,
  recoveryAttempts: 0,
  currentQuality: 'auto',
  epgData: [],           // array of {time, title, duration, status:'past'|'now'|'next'}
  epgRefreshTimer: null
};

/* ─────────────── storage ─────────────── */
function hasStorage(){ return typeof window.storage !== 'undefined' && window.storage; }
function storageGet(k, fb){
  if(!hasStorage()) return Promise.resolve(fb);
  return window.storage.get(k, false).then(function(r){
    if(!r || r.value == null) return fb;
    try{ return JSON.parse(r.value); }catch(e){ return fb; }
  }).catch(function(){ return fb; });
}
function storageSet(k, v){
  if(!hasStorage()) return Promise.resolve(null);
  return window.storage.set(k, JSON.stringify(v), false).catch(function(){ return null; });
}

/* ─────────────── utils ─────────────── */
function esc(s){
  return String(s == null ? '' : s)
    .replace(/[&<>"']/g, function(c){ return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; });
}
function debounce(fn, ms){
  var t; return function(){
    var a = arguments, c = this;
    clearTimeout(t);
    t = setTimeout(function(){ fn.apply(c,a); }, ms);
  };
}
function pad3(n){ return String(n).padStart(3,'0'); }
function uid(ch){ return ch.url; }
function isValidUrl(s){
  try{ var u = new URL(s); return u.protocol === 'http:' || u.protocol === 'https:'; }
  catch(e){ return false; }
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}
function cssEscape(s){ return String(s).replace(/["\\]/g,'\\$&'); }
function formatHHMM(date){
  return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
}

/* ─────────────── fuzzy match ─────────────── */
function matchScore(text, q){
  if(!q) return 0;
  text = text.toLowerCase();
  var idx = text.indexOf(q);
  if(idx !== -1) return idx;
  var ti = 0;
  for(var qi = 0; qi < q.length; qi++){
    ti = text.indexOf(q[qi], ti);
    if(ti === -1) return -1;
    ti++;
  }
  return 1000;
}

/* ─────────────── M3U parsing ─────────────── */
function parseM3U(text){
  var lines = text.split(/\r?\n/);
  var channels = [];
  var current = null;
  for(var i = 0; i < lines.length; i++){
    var line = lines[i].trim();
    if(!line) continue;
    if(line[0] === '#'){
      if(line.indexOf('#EXTINF') === 0){
        var colon = line.indexOf(':');
        var rest = colon !== -1 ? line.slice(colon+1) : '';
        var comma = rest.lastIndexOf(',');
        var attrs = comma !== -1 ? rest.slice(0, comma) : rest;
        var name = comma !== -1 ? rest.slice(comma+1).trim() : '';
        current = { name: name || 'Unknown Channel', logo: '', group: 'Uncategorized' };
        var lm = attrs.match(/tvg-logo="([^"]*)"/i);
        if(lm && lm[1]) current.logo = lm[1];
        var gm = attrs.match(/group-title="([^"]*)"/i);
        if(gm && gm[1] && gm[1].trim()) current.group = gm[1].trim();
      }
      continue;
    }
    if(current && /^https?:\/\//i.test(line)){
      current.url = line;
      channels.push(current);
      current = null;
    }
  }
  for(var j = 0; j < channels.length; j++) channels[j].number = j+1;
  return channels;
}

function buildCategories(channels){
  var map = {};
  for(var i = 0; i < channels.length; i++){
    var g = channels[i].group || 'Uncategorized';
    map[g] = (map[g] || 0) + 1;
  }
  var cats = Object.keys(map).map(function(n){ return {name:n, count:map[n]}; });
  cats.sort(function(a,b){ return a.name.localeCompare(b.name); });
  return cats;
}

/* ─────────────── EPG (simulated, since live EPG requires XMLTV sources) ─────────────── */
/**
 * Generates a plausible-looking EPG schedule for the current channel.
 * In a real deployment this would fetch from an XMLTV/EPG API.
 * We generate 8 slots of 30–90 min each, spanning roughly ±3 h around now.
 */
function generateEpg(channelName){
  var now = new Date();
  var slots = [];
  // Start 3 hours ago, generate 8 slots
  var cursor = new Date(now.getTime() - 3 * 60 * 60 * 1000);
  // Round to nearest half hour
  cursor.setMinutes(cursor.getMinutes() < 30 ? 0 : 30, 0, 0);

  var genericTitles = [
    'Morning News', 'World Report', 'Business Today', 'Sports Roundup',
    'Documentary: Nature', 'Talk Show Live', 'Evening Journal',
    'Late Night Edition', 'Weekend Highlights', 'Culture & Arts',
    'Tech Weekly', 'Market Watch', 'Local News', 'Weather Update',
    'Prime Time Live', 'Feature Film', 'Series: Season Finale', 'Night Broadcast'
  ];
  var seed = channelName.length;
  for(var i = 0; i < 8; i++){
    var durationMins = [30, 45, 60, 90][(seed * (i+1)) % 4];
    var end = new Date(cursor.getTime() + durationMins * 60 * 1000);
    var titleIdx = (seed + i * 3) % genericTitles.length;
    var status;
    if(end <= now) status = 'past';
    else if(cursor <= now && end > now) status = 'now';
    else status = 'next';

    slots.push({
      start: new Date(cursor),
      end: end,
      title: genericTitles[titleIdx],
      duration: durationMins,
      status: status
    });
    cursor = end;
  }
  return slots;
}

function renderEpg(channelName){
  state.epgData = generateEpg(channelName || '');
  document.getElementById('epgChannelName').textContent = channelName || '—';
  renderEpgTimeline();
}

function renderEpgTimeline(){
  var el = document.getElementById('epgTimeline');
  if(!state.epgData.length){
    el.innerHTML = '<div class="epg-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18" stroke-linecap="round"/></svg><p>No schedule available</p></div>';
    return;
  }

  var now = new Date();
  var html = '';
  var sections = { past: [], now: [], next: [] };
  state.epgData.forEach(function(slot){ sections[slot.status].push(slot); });

  if(sections.past.length){
    html += '<div class="epg-section-label past">Earlier</div>';
    sections.past.forEach(function(s){
      html += epgItemHtml(s, now);
    });
  }
  if(sections.now.length){
    html += '<div class="epg-section-label now">On now</div>';
    sections.now.forEach(function(s){
      html += epgItemHtml(s, now);
      // update player meta epg line
      var epgLine = document.getElementById('pmEpg');
      if(epgLine){
        epgLine.textContent = s.title + '  ·  until ' + formatHHMM(s.end);
        epgLine.classList.add('show');
      }
    });
  }
  if(sections.next.length){
    html += '<div class="epg-section-label next">Up next</div>';
    sections.next.forEach(function(s){
      html += epgItemHtml(s, now);
    });
  }

  el.innerHTML = html;
}

function epgItemHtml(slot, now){
  var pct = 0;
  if(slot.status === 'now'){
    var elapsed = now - slot.start;
    var total = slot.end - slot.start;
    pct = Math.min(100, Math.round((elapsed / total) * 100));
  }
  var progressHtml = slot.status === 'now'
    ? '<div class="epg-progress-bar"><div class="epg-progress-fill" style="width:' + pct + '%"></div></div>'
    : '';
  var tagHtml = slot.status === 'now' ? '<span class="epg-now-tag">LIVE</span>' : '';
  return '<div class="epg-item ' + slot.status + '">' +
    '<div class="epg-time">' + formatHHMM(slot.start) + '</div>' +
    '<div style="flex:1;min-width:0;">' +
      '<div class="epg-title">' + esc(slot.title) + '</div>' +
      progressHtml +
    '</div>' +
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">' +
      '<div class="epg-duration">' + slot.duration + 'm</div>' +
      tagHtml +
    '</div>' +
  '</div>';
}

/* ─────────────── playlist fetching ─────────────── */
function fetchPlaylist(pl){
  state.loadingPlaylist = true;
  state.playlistError = null;
  state.channels = [];
  state.categories = [];
  renderFetchError();
  renderSidebar();
  renderGrid();

  var ctrl = new AbortController();
  var reqTimeout = setTimeout(function(){ ctrl.abort(); }, 30000);

  fetch(pl.url, { cache:'no-store', signal: ctrl.signal }).then(function(res){
    clearTimeout(reqTimeout);
    if(!res.ok) throw new Error('HTTP ' + res.status + ' ' + res.statusText);
    return res.text();
  }).then(function(text){
    var channels = parseM3U(text);
    if(!channels.length) throw new Error('No playable entries found in this playlist.');
    state.channels = channels;
    state.categories = buildCategories(channels);
    state.loadingPlaylist = false;
    state.playlistError = null;
    resetView();
    renderSidebar();
    renderMobileTabs();
    renderFetchError();
    applyFilters();
  }).catch(function(err){
    clearTimeout(reqTimeout);
    state.loadingPlaylist = false;
    state.playlistError = (err && err.message) ? err.message : 'Unknown error loading playlist.';
    renderSidebar();
    renderFetchError();
    renderGrid();
  });
}

function resetView(){
  state.tab = 'all';
  state.query = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  state.renderedCount = 0;
}

/* ─────────────── filtering ─────────────── */
function computeFiltered(){
  var list = state.channels;
  if(state.tab === 'favorites'){
    list = list.filter(function(c){ return state.favorites.indexOf(uid(c)) !== -1; });
  } else if(state.tab === 'recent'){
    var byId = {};
    state.channels.forEach(function(c){ byId[uid(c)] = c; });
    list = state.recent.map(function(id){ return byId[id]; }).filter(Boolean);
  } else if(state.tab !== 'all'){
    list = list.filter(function(c){ return c.group === state.tab; });
  }
  var q = state.query.trim().toLowerCase();
  if(q){
    var scored = [];
    list.forEach(function(c){
      var s1 = matchScore(c.name, q), s2 = matchScore(c.group, q);
      var best = s1 === -1 ? s2 : (s2 === -1 ? s1 : Math.min(s1,s2));
      if(best !== -1) scored.push({c:c, score:best});
    });
    scored.sort(function(a,b){ return a.score - b.score; });
    list = scored.map(function(s){ return s.c; });
  }
  state.filtered = list;
}

function applyFilters(){
  computeFiltered();
  state.renderedCount = 0;
  renderToolbar();
  renderChipRow();
  renderGrid();
}

/* ─────────────── sidebar ─────────────── */
function renderSidebar(){
  var el = document.getElementById('sidebar');
  var html = '<div class="nav-group">';
  html += navItem('all', svgGrid(), 'All Channels', state.channels.length);
  html += navItem('favorites', svgStar(), 'Favorites', state.favorites.length);
  html += navItem('recent', svgClock(), 'Recently Watched', state.recent.length);
  html += '</div>';
  if(state.categories.length){
    html += '<div style="margin-top:4px;"><div class="nav-section-label">Categories</div><div class="nav-group">';
    state.categories.forEach(function(cat){
      html += navItem(cat.name, '', cat.name, cat.count);
    });
    html += '</div></div>';
  }
  el.innerHTML = html;
  el.querySelectorAll('.nav-item').forEach(function(item){
    item.addEventListener('click', function(){
      state.tab = item.getAttribute('data-tab');
      renderSidebar();
      renderMobileTabs();
      applyFilters();
    });
  });
}

  return '<div class="nav-item' + a + '" data-tab="' + esc(key) + '">' +

    '<span class="nav-count">' + count + '</span></div>';

function renderToolbar(){
  var map = {all:'All Channels', favorites:'Favorites', recent:'Recently Watched'};
  document.getElementById('viewTitle').textContent = map[state.tab] || state.tab;

    state.query ? ('matches for "' + state.query + '"') : (state.filtered.length + ' channels');

/* ─────────────── grid ─────────────── */
function skeletonGrid(){
  var h = '';
  for(var i = 0; i < 18; i++)
    h += '<div class="skel-card"><div class="skel skel-thumb"></div><div class="skel skel-line" style="width:75%"></div><div class="skel skel-line" style="width:45%"></div></div>';
  return h;
}

function cardHtml(ch){
  var id = uid(ch);
  var fav = state.favorites.indexOf(id) !== -1;
  var playing = state.current && uid(state.current) === id;
  var logo = ch.logo || FALLBACK_SVG;
  return '<div class="card' + (playing ? ' now-playing' : '') + '" data-id="' + esc(id) + '">' +
    '<div class="card-playing-indicator"></div>' +
    '<button class="star-btn' + (fav ? ' active' : '') + '" data-id="' + esc(id) + '" aria-label="Favorite">' +
      '<svg viewBox="0 0 24 24" fill="' + (fav ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2"><path d="M12 3l2.6 5.6 6.1.8-4.5 4.3 1.2 6-5.4-3-5.4 3 1.2-6L3.3 9.4l6.1-.8L12 3z" stroke-linejoin="round"/></svg>' +
    '</button>' +
    '<div class="card-thumb">' +
      '<img class="channel-logo" src="' + esc(logo) + '" alt="" loading="lazy">' +
      '<span class="ch-num">' + pad3(ch.number) + '</span>' +
      '<div class="play-overlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5l12 7-12 7V5z"/></svg></div>' +
    '</div>' +
    '<div class="card-name">' + esc(ch.name) + '</div>' +
    '<div class="card-group">' + esc(ch.group) + '</div>' +
  '</div>';
}

function renderGrid(){
  var grid = document.getElementById('grid');
  var lmw = document.getElementById('loadMoreWrap');
  if(state.loadingPlaylist){ grid.innerHTML = skeletonGrid(); lmw.style.display = 'none'; return; }
  if(state.playlistError){ grid.innerHTML = ''; lmw.style.display = 'none'; return; }

  if(!state.filtered.length){
    var msg, sub;
    if(state.tab === 'favorites'){ msg = 'No favorites yet'; sub = 'Tap the star on any channel card to save it here.'; }
    else if(state.tab === 'recent'){ msg = 'Nothing watched yet'; sub = 'Channels you play will appear here.'; }
    else if(state.query){ msg = 'No results'; sub = 'No channels match "' + state.query + '".'; }
    else { msg = 'Empty category'; sub = 'No channels in this category right now.'; }
    grid.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg><h3>' + esc(msg) + '</h3><p>' + esc(sub) + '</p></div>';
    lmw.style.display = 'none';
    return;
  }

  if(!state.renderedCount) state.renderedCount = Math.min(BATCH_SIZE, state.filtered.length);
  grid.innerHTML = state.filtered.slice(0, state.renderedCount).map(cardHtml).join('');
  bindGridEvents(grid);
  lmw.style.display = state.renderedCount < state.filtered.length ? 'flex' : 'none';
}

function bindGridEvents(grid){
  grid.querySelectorAll('img.channel-logo').forEach(function(img){
    img.addEventListener('error', function(){
      if(!img.classList.contains('logo-fallback')){
        img.src = FALLBACK_SVG;
        img.classList.add('logo-fallback');
      }
    }, {once:true});
  });
  grid.querySelectorAll('.star-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      toggleFavorite(btn.getAttribute('data-id'));
    });
  });
  grid.querySelectorAll('.card').forEach(function(card){
    card.addEventListener('click', function(){
      var id = card.getAttribute('data-id');
      var ch = state.channels.find(function(c){ return uid(c) === id; });
      if(ch) playChannel(ch);
    });
  });
}

/* ─────────────── favorites / recent ─────────────── */
function toggleFavorite(id){
  var idx = state.favorites.indexOf(id);
  if(idx === -1) state.favorites.push(id);
  else state.favorites.splice(idx, 1);
  storageSet('favorites', state.favorites);
  renderSidebar();
  if(state.tab === 'favorites'){ applyFilters(); }
  else {
    document.querySelectorAll('.star-btn[data-id="' + cssEscape(id) + '"]').forEach(function(btn){
      var active = state.favorites.indexOf(id) !== -1;
      btn.classList.toggle('active', active);
      btn.querySelector('svg').setAttribute('fill', active ? 'currentColor' : 'none');
    });
  }
  if(state.current && uid(state.current) === id) syncFavBtn();
}

function addToRecent(id){
  var idx = state.recent.indexOf(id);
  if(idx !== -1) state.recent.splice(idx, 1);
  state.recent.unshift(id);
  if(state.recent.length > RECENT_MAX) state.recent.length = RECENT_MAX;
  storageSet('recent', state.recent);
  renderSidebar();
  if(state.tab === 'recent') applyFilters();
}

/* ─────────────── player ─────────────── */
function destroyPlayer(){
  if(state.hls){ try{ state.hls.destroy(); }catch(e){} state.hls = null; }
  clearStatusTimeout();
  var video = document.getElementById('video');
  video.pause();
  video.removeAttribute('src');
  try{ video.load(); }catch(e){}
  var ov = document.querySelector('.stage-overlay');
  if(ov) ov.remove();
  var lb = document.querySelector('.live-badge');
  if(lb) lb.remove();
  document.getElementById('controlBar').classList.remove('visible');
  state.recoveryAttempts = 0;
}

function clearStatusTimeout(){
  if(state.statusTimeout){ clearTimeout(state.statusTimeout); state.statusTimeout = null; }
}

function armStatusTimeout(attempt){
  clearStatusTimeout();
  var delay = attempt ? TIMEOUT_MS + attempt * 4000 : TIMEOUT_MS;
  state.statusTimeout = setTimeout(function(){
    handleStreamError('This channel is taking too long to respond. It may be offline or geo-restricted.');
  }, delay);
}

function setOverlay(html){
  var stage = document.getElementById('playerStage');
  var ex = stage.querySelector('.stage-overlay');
  if(ex) ex.remove();
  if(!html) return;
  var div = document.createElement('div');
  div.className = 'stage-overlay';
  div.innerHTML = html;
  stage.appendChild(div);
}

function setLiveBadge(show){
  var stage = document.getElementById('playerStage');
  var ex = stage.querySelector('.live-badge');
  if(ex) ex.remove();
  if(show){
    var div = document.createElement('div');
    div.className = 'live-badge';
    div.innerHTML = '<span class="live-dot"></span>LIVE';
    stage.appendChild(div);
  }
}

function playChannel(ch){
  state.current = ch;
  state.recoveryAttempts = 0;
  addToRecent(uid(ch));

  document.getElementById('playerEmpty').style.display = 'none';
  var video = document.getElementById('video');
  video.style.display = 'block';
  document.getElementById('playerMeta').style.display = 'flex';

  document.getElementById('pmName').textContent = ch.name;
  document.getElementById('pmGroup').textContent = ch.group;
  var pmLogo = document.getElementById('pmLogo');
  pmLogo.src = ch.logo || FALLBACK_SVG;
  pmLogo.onerror = function(){ pmLogo.onerror = null; pmLogo.src = FALLBACK_SVG; };
  var epgLine = document.getElementById('pmEpg');
  if(epgLine){ epgLine.classList.remove('show'); epgLine.textContent = ''; }
  syncFavBtn();

  var stage = document.getElementById('playerStage');
  stage.classList.add('tuning');
  setTimeout(function(){ stage.classList.remove('tuning'); }, 500);

  setLiveBadge(false);
  setOverlay('<div class="spinner"></div><div class="overlay-title">Tuning in…</div><div class="overlay-detail">' + esc(ch.name) + '</div>');
  resetQuality();
  destroyPlayer();
  armStatusTimeout(0);

  // Start EPG
  renderEpg(ch.name);
  if(state.epgRefreshTimer) clearInterval(state.epgRefreshTimer);
  state.epgRefreshTimer = setInterval(function(){
    if(state.current) renderEpgTimeline();
  }, 60000);

  var url = ch.url;
  if(!(window.Hls && Hls.isSupported()) && video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = url;
    video.addEventListener('loadedmetadata', function(){ handleStreamReady(); }, {once:true});
    video.addEventListener('error', function(){ handleStreamError('This browser could not play the stream.'); }, {once:true});
    video.play().catch(function(){});
  } else if(window.Hls && Hls.isSupported()){
    startHls(url);
  } else {
    handleStreamError('HLS playback is not supported in this browser.');
  }

  initControlBar();
  renderGrid();
}

function startHls(url){
  var video = document.getElementById('video');
  var hls = new Hls({
    enableWorker: true,
    maxBufferLength: 40,
    maxMaxBufferLength: 80,
    liveSyncDurationCount: 3,
    liveMaxLatencyDurationCount: 8,
    lowLatencyMode: false,
    fragLoadingMaxRetry: 6,
    fragLoadingRetryDelay: 500,
    fragLoadingMaxRetryTimeout: 8000,
    manifestLoadingMaxRetry: 5,
    manifestLoadingRetryDelay: 800,
    manifestLoadingMaxRetryTimeout: 10000,
    levelLoadingMaxRetry: 5,
    levelLoadingRetryDelay: 600,
    startLevel: -1,
    debug: false
  });
  state.hls = hls;

  // Timeout extension: once manifest is loading, give more time
  hls.on(Hls.Events.MANIFEST_LOADING, function(){
    // Reset timeout when we're actually loading, gives full window
    clearStatusTimeout();
    armStatusTimeout(0);
  });

  hls.loadSource(url);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, function(evt, data){
    handleStreamReady();
    buildQualityOptions(hls);
    video.play().catch(function(){});
  });

  hls.on(Hls.Events.ERROR, function(evt, data){
    if(!data || !data.fatal) return;
    state.recoveryAttempts = (state.recoveryAttempts || 0) + 1;

    if(state.recoveryAttempts <= MAX_RETRIES){
      setOverlay(
        '<div class="spinner"></div>' +
        '<div class="overlay-title">Reconnecting…</div>' +
        '<div class="overlay-detail">Attempt ' + state.recoveryAttempts + ' of ' + MAX_RETRIES + '</div>'
      );
      clearStatusTimeout();
      armStatusTimeout(state.recoveryAttempts);

      if(data.type === 'networkError'){
        setTimeout(function(){
          try{ hls.startLoad(-1); }catch(e){}
        }, RETRY_DELAY_MS * state.recoveryAttempts);
        return;
      }
      if(data.type === 'mediaError'){
        setTimeout(function(){
          try{ hls.recoverMediaError(); }catch(e){}
        }, 300);
        return;
      }
    }
    handleStreamError(describeHlsError(data));
  });

  // Additional: listen for stalls and recover
  video.addEventListener('stalled', function(){
    if(state.current && state.hls){
      try{ hls.startLoad(); }catch(e){}
    }
  });
}

function describeHlsError(data){
  if(!data || !data.type) return 'The stream could not be played.';
  if(data.type === 'networkError'){
    if(data.details && /manifest/i.test(data.details))
      return 'The channel stream could not be reached — it may be offline, geo-blocked, or expired. Try another channel or retry.';
    return 'A network error occurred. Check your connection and try again.';
  }
  if(data.type === 'mediaError') return 'The video stream could not be decoded by this browser. Try a different channel.';
  return 'This channel is unavailable right now.';
}

function handleStreamReady(){
  clearStatusTimeout();
  setOverlay(null);
  setLiveBadge(true);
  document.getElementById('controlBar').classList.add('visible');
  syncPlayPause();
  armAutoHide();
}

function handleStreamError(msg){
  clearStatusTimeout();
  setLiveBadge(false);
  document.getElementById('controlBar').classList.remove('visible');
  setOverlay(
    '<div class="overlay-title">Stream unavailable</div>' +
    '<div class="overlay-detail">' + esc(msg || 'This channel could not be loaded.') + '</div>' +
    '<button class="btn btn-primary" id="retryBtn" style="margin-top:12px;">Retry</button>'
  );
  var rb = document.getElementById('retryBtn');
  if(rb) rb.addEventListener('click', function(){ if(state.current) playChannel(state.current); });
}

function stopPlayback(){
  destroyPlayer();
  if(state.epgRefreshTimer){ clearInterval(state.epgRefreshTimer); state.epgRefreshTimer = null; }
  state.current = null;
  document.getElementById('video').style.display = 'none';
  document.getElementById('playerMeta').style.display = 'none';
  document.getElementById('playerEmpty').style.display = 'flex';
  document.getElementById('epgChannelName').textContent = '—';
  document.getElementById('epgTimeline').innerHTML = '<div class="epg-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18" stroke-linecap="round"/></svg><p>Play a channel to see what\'s on</p><span class="epg-note">Programme schedule will appear here</span></div>';
  renderGrid();
}

/* ─────────────── quality ─────────────── */
function resetQuality(){
  state.currentQuality = 'auto';
  var popup = document.getElementById('qualityPopup');
  popup.innerHTML = '<div class="quality-option active" data-level="auto">Auto</div>';
  document.getElementById('qualityLabel').textContent = 'Auto';
  bindQualityPopup();
}

function buildQualityOptions(hls){
  var levels = hls.levels || [];
  if(!levels.length){ resetQuality(); return; }
  var sorted = levels.map(function(l, i){ return {i:i, h:l.height||0, bw:l.bitrate||0}; }).sort(function(a,b){ return b.h-a.h; });
  var popup = document.getElementById('qualityPopup');
  var html = '<div class="quality-option active" data-level="auto">Auto</div>';
  sorted.forEach(function(l){
    var label = l.h ? (l.h + 'p') : ('Level ' + (l.i+1));
    if(l.bw) label += ' <span style="opacity:.5;font-size:10px;">' + Math.round(l.bw/1000) + 'k</span>';
    html += '<div class="quality-option" data-level="' + l.i + '">' + label + '</div>';
  });
  popup.innerHTML = html;
  document.getElementById('qualityLabel').textContent = 'Auto';
  bindQualityPopup();
}

function bindQualityPopup(){
  var popup = document.getElementById('qualityPopup');
  popup.querySelectorAll('.quality-option').forEach(function(opt){
    opt.addEventListener('click', function(){
      var level = opt.getAttribute('data-level');
      if(state.hls){
        state.hls.currentLevel = level === 'auto' ? -1 : parseInt(level);
      }
      state.currentQuality = level;
      document.getElementById('qualityLabel').textContent = level === 'auto' ? 'Auto' : opt.textContent.replace(/\s+\d+k$/,'').trim();
      popup.querySelectorAll('.quality-option').forEach(function(o){ o.classList.remove('active'); });
      opt.classList.add('active');
      popup.classList.remove('open');
      showToast('Quality: ' + (level === 'auto' ? 'Auto' : document.getElementById('qualityLabel').textContent));
    });
  });
}

/* ─────────────── controls ─────────────── */
var hideTimer = null;

function initControlBar(){
  var video = document.getElementById('video');
  video.muted = true;
  video.volume = 1;
  document.getElementById('volumeSlider').value = 100;
  document.getElementById('iconVolOn').style.display = 'none';
  document.getElementById('iconVolOff').style.display = 'inline';
}

function syncPlayPause(){
  var video = document.getElementById('video');
  document.getElementById('iconPlay').style.display = video.paused ? 'inline' : 'none';
  document.getElementById('iconPause').style.display = video.paused ? 'none' : 'inline';
}

function armAutoHide(){
  clearTimeout(hideTimer);
  document.getElementById('controlBar').classList.remove('hidden-bar');
  hideTimer = setTimeout(function(){
    var video = document.getElementById('video');
    if(!video.paused) document.getElementById('controlBar').classList.add('hidden-bar');
  }, 3000);
}

function syncFavBtn(){
  var btn = document.getElementById('pmFav');
  if(!state.current){ btn.classList.remove('fav-active'); return; }
  var a = state.favorites.indexOf(uid(state.current)) !== -1;
  btn.classList.toggle('fav-active', a);
  btn.querySelector('svg').setAttribute('fill', a ? 'currentColor' : 'none');
}

function bindControlBarEvents(){
  var video = document.getElementById('video');
  var stage = document.getElementById('playerStage');
  var bar = document.getElementById('controlBar');

  document.getElementById('ctrlPlayPause').addEventListener('click', function(){
    if(video.paused) video.play().catch(function(){}); else video.pause();
  });
  video.addEventListener('play', syncPlayPause);
  video.addEventListener('pause', function(){
    syncPlayPause();
    bar.classList.remove('hidden-bar');
    clearTimeout(hideTimer);
  });

  document.getElementById('ctrlMute').addEventListener('click', function(){
    video.muted = !video.muted;
    if(!video.muted && video.volume === 0) video.volume = 1;
    syncVolUI();
  });
  document.getElementById('volumeSlider').addEventListener('input', function(e){
    var v = Number(e.target.value) / 100;
    video.volume = v;
    video.muted = v === 0;
    syncVolUI();
  });

  function syncVolUI(){
    var off = video.muted || video.volume === 0;
    document.getElementById('iconVolOn').style.display = off ? 'none' : 'inline';
    document.getElementById('iconVolOff').style.display = off ? 'inline' : 'none';
    document.getElementById('volumeSlider').value = off ? 0 : Math.round(video.volume * 100);
  }

  // Quality popup toggle
  document.getElementById('qualityBtn').addEventListener('click', function(e){
    e.stopPropagation();
    document.getElementById('qualityPopup').classList.toggle('open');
  });
  document.addEventListener('click', function(){
    document.getElementById('qualityPopup').classList.remove('open');
  });

  document.getElementById('ctrlFullscreen').addEventListener('click', function(){
    if(document.fullscreenElement) document.exitFullscreen();
    else if(stage.requestFullscreen) stage.requestFullscreen();
  });

  stage.addEventListener('mousemove', function(){
    if(state.current) armAutoHide();
  });
  stage.addEventListener('mouseleave', function(){
    if(!video.paused) bar.classList.add('hidden-bar');
  });
  stage.addEventListener('click', function(e){
    if(e.target === video) armAutoHide();
  });
}

/* ─────────────── fetch error ─────────────── */
function renderFetchError(){
  var wrap = document.getElementById('fetchErrorWrap');
  if(!state.playlistError){ wrap.innerHTML = ''; return; }
  wrap.innerHTML =
    '<div class="fetch-error">' +
      '<div class="fe-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01" stroke-linecap="round"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z" stroke-linejoin="round"/></svg></div>' +
      '<div><div class="fe-title">Playlist could not be loaded</div>' +
      '<div class="fe-detail">' + esc(state.playlistError) + '<br><br>This usually means the server does not allow cross-origin requests, the URL is unreachable, or the file is malformed. Try a different playlist URL or use a proxy.</div>' +
      '<div class="fe-actions">' +
        '<button class="btn btn-primary" id="retryPlBtn">Retry</button>' +
        '<button class="btn" id="switchPlBtn">Use a different playlist</button>' +
      '</div></div></div>';
  document.getElementById('retryPlBtn').addEventListener('click', function(){
    var pl = state.playlists.find(function(p){ return p.id === state.activePlaylistId; });
    if(pl) fetchPlaylist(pl);
  });
  document.getElementById('switchPlBtn').addEventListener('click', openModal);
}

/* ─────────────── playlist management ─────────────── */
function renderPlaylistSelect(){
  document.getElementById('playlistSelect').innerHTML = state.playlists.map(function(p){
    return '<option value="' + esc(p.id) + '"' + (p.id === state.activePlaylistId ? ' selected' : '') + '>' + esc(p.name) + '</option>';
  }).join('');
}

function switchPlaylist(id){
  var pl = state.playlists.find(function(p){ return p.id === id; });
  if(!pl) return;
  state.activePlaylistId = id;
  storageSet('activePlaylistId', id);
  stopPlayback();
  fetchPlaylist(pl);
  renderPlaylistSelect();
}

function renderPlaylistList(){
  var el = document.getElementById('playlistList');
  var html = '<div class="pl-list-title">Your playlists</div>';
  html += state.playlists.map(function(p){
    return '<div class="pl-row">' +
      '<div><div class="pl-name">' + esc(p.name) + (p.builtIn ? '<span class="pl-builtin">DEFAULT</span>' : '') + '</div>' +
      '<div class="pl-url">' + esc(p.url) + '</div></div>' +
      '<div class="pl-actions">' +
        '<button data-use="' + esc(p.id) + '">Use</button>' +
        (p.builtIn ? '' : '<button data-remove="' + esc(p.id) + '">Remove</button>') +
      '</div></div>';
  }).join('');
  el.innerHTML = html;
  el.querySelectorAll('[data-use]').forEach(function(btn){
    btn.addEventListener('click', function(){ switchPlaylist(btn.getAttribute('data-use')); closeModal(); });
  });
  el.querySelectorAll('[data-remove]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = btn.getAttribute('data-remove');
      state.playlists = state.playlists.filter(function(p){ return p.id !== id; });
      storageSet('playlists', state.playlists);
      if(state.activePlaylistId === id) switchPlaylist('default');
      renderPlaylistList();
      renderPlaylistSelect();
      showToast('Playlist removed');
    });
  });
}

function openModal(){
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('plName').value = '';
  document.getElementById('plUrl').value = '';
  document.getElementById('plError').classList.remove('show');
  renderPlaylistList();
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }

function saveNewPlaylist(){
  var name = document.getElementById('plName').value.trim();
  var url = document.getElementById('plUrl').value.trim();
  var errEl = document.getElementById('plError');
  if(!isValidUrl(url)){
    errEl.textContent = 'Enter a valid http(s) URL.';
    errEl.classList.add('show');
    return;
  }
  if(!name) name = url.replace(/^https?:\/\//,'').split('/')[0];
  var id = 'pl_' + Date.now();
  state.playlists.push({id:id, name:name, url:url, builtIn:false});
  storageSet('playlists', state.playlists);
  renderPlaylistList();
  renderPlaylistSelect();
  document.getElementById('plName').value = '';
  document.getElementById('plUrl').value = '';
  errEl.classList.remove('show');
  showToast('Playlist added — select Use to load it');
}

/* ─────────────── global events ─────────────── */
function bindGlobalEvents(){
  document.getElementById('searchInput').addEventListener('input', debounce(function(e){
    state.query = e.target.value;
    document.getElementById('searchClear').classList.toggle('show', !!state.query);
    applyFilters();
  }, 160));
  document.getElementById('searchClear').addEventListener('click', function(){
    state.query = '';
    document.getElementById('searchInput').value = '';
    this.classList.remove('show');
    applyFilters();
  });

  document.getElementById('addPlaylistBtn').addEventListener('click', openModal);
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function(e){ if(e.target === this) closeModal(); });
  document.getElementById('modalSave').addEventListener('click', saveNewPlaylist);
  document.getElementById('playlistSelect').addEventListener('change', function(e){ switchPlaylist(e.target.value); });

  document.getElementById('pmFav').addEventListener('click', function(){
    if(state.current) toggleFavorite(uid(state.current));
  });
  document.getElementById('pmClose').addEventListener('click', stopPlayback);

  document.getElementById('epgRefreshBtn').addEventListener('click', function(){
    if(state.current) renderEpg(state.current.name);
    showToast('Programme guide refreshed');
  });

  bindControlBarEvents();
  bindQualityPopup();

  document.getElementById('loadMoreBtn').addEventListener('click', function(){
    state.renderedCount = Math.min(state.renderedCount + BATCH_SIZE, state.filtered.length);
    renderGrid();
  });

  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting && state.renderedCount < state.filtered.length){
        state.renderedCount = Math.min(state.renderedCount + BATCH_SIZE, state.filtered.length);
        renderGrid();
      }
    });
  }, {rootMargin:'300px'});
  obs.observe(document.getElementById('sentinel'));
}

/* ─────────────── init ─────────────── */
function init(){
  bindGlobalEvents();
  renderSidebar();
  renderMobileTabs();
  renderGrid();
  renderPlaylistSelect();

  Promise.all([
    storageGet('favorites', []),
    storageGet('recent', []),
    storageGet('playlists', null),
    storageGet('activePlaylistId', 'default')
  ]).then(function(res){
    state.favorites = Array.isArray(res[0]) ? res[0] : [];
    state.recent = Array.isArray(res[1]) ? res[1] : [];
    state.playlists = Array.isArray(res[2]) && res[2].length ? res[2] : [DEFAULT_PLAYLIST];
    if(!state.playlists.some(function(p){ return p.id === 'default'; }))
      state.playlists.unshift(DEFAULT_PLAYLIST);
    state.activePlaylistId = res[3] && state.playlists.some(function(p){ return p.id === res[3]; }) ? res[3] : 'default';
    renderSidebar();
    renderPlaylistSelect();
    var active = state.playlists.find(function(p){ return p.id === state.activePlaylistId; }) || DEFAULT_PLAYLIST;
    fetchPlaylist(active);
  });
}

document.addEventListener('DOMContentLoaded', init);
})();
</script>
