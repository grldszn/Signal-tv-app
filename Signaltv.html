<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal — Live TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
  :root{
    --bg:#090b0f;
    --panel:#12151c;
    --panel-2:#191e28;
    --panel-3:#1f2532;
    --line:#242a38;
    --line-soft:#1b2029;
    --text:#eceef2;
    --muted:#8d94a6;
    --muted-dim:#5b6275;
    --live:#ff3b4a;
    --accent:#36e3c6;
    --accent-dim:#1c5f53;
    --star:#ffb238;
    --danger:#ff5d5d;
    --radius:12px;
    --radius-sm:8px;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
    --shadow-lg:0 20px 60px -20px rgba(0,0,0,0.6);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{background:var(--accent);color:#06120f;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--panel-3);border-radius:8px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--line);}
  a{color:inherit;}
  button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}

  /* ---------- App shell ---------- */
  #app{display:flex;flex-direction:column;min-height:100vh;}

  .topbar{
    position:sticky;top:0;z-index:40;
    display:flex;align-items:center;gap:18px;
    padding:14px 22px;
    background:rgba(9,11,15,0.88);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line-soft);
  }
  .brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .brand-mark{
    width:30px;height:30px;border-radius:8px;
    background:linear-gradient(135deg,var(--accent),#1c8a76);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 1px rgba(255,255,255,0.06) inset;
  }
  .brand-mark svg{width:16px;height:16px;}
  .brand-name{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:0.2px;}
  .brand-name span{color:var(--accent);}

  .search-wrap{flex:1;max-width:480px;position:relative;}
  .search-wrap svg{
    position:absolute;left:13px;top:50%;transform:translateY(-50%);
    width:16px;height:16px;color:var(--muted-dim);pointer-events:none;
  }
  #searchInput{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:999px;
    padding:10px 14px 10px 38px;
    font-size:14px;
    transition:border-color .15s, background .15s;
  }
  #searchInput::placeholder{color:var(--muted-dim);}
  #searchInput:focus{border-color:var(--accent-dim);background:var(--panel-2);outline:none;}
  .search-clear{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    width:22px;height:22px;border-radius:50%;border:none;background:var(--panel-3);
    color:var(--muted);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:13px;
  }
  .search-clear.show{display:flex;}

  .topbar-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}

  .playlist-select{
    background:var(--panel);border:1px solid var(--line);color:var(--text);
    border-radius:999px;padding:9px 14px;font-size:13px;font-family:var(--font-body);cursor:pointer;
    max-width:200px;
  }
  .btn{
    border:1px solid var(--line);background:var(--panel);color:var(--text);
    border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;transition:transform .12s, background .15s, border-color .15s;
    white-space:nowrap;
  }
  .btn:hover{background:var(--panel-2);border-color:var(--line);transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn-accent{background:var(--accent);color:#062420;border-color:var(--accent);}
  .btn-accent:hover{background:#48f0d2;}
  .btn-ghost{background:transparent;}
  .btn-danger{color:var(--danger);}
  .btn svg{width:14px;height:14px;}

  /* ---------- layout ---------- */
  .layout{display:flex;flex:1;min-height:0;}

  .sidebar{
    width:230px;flex-shrink:0;
    background:var(--panel);
    border-right:1px solid var(--line-soft);
    padding:18px 12px;
    position:sticky;top:65px;
    height:calc(100vh - 65px);
    overflow-y:auto;
  }
  .nav-group{margin-bottom:18px;}
  .nav-label{
    font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--muted-dim);padding:0 10px 8px;
  }
  .nav-item{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--muted);
    font-size:14px;font-weight:500;margin-bottom:2px;transition:background .12s,color .12s;
    border:1px solid transparent;
  }
  .nav-item:hover{background:var(--panel-2);color:var(--text);}
  .nav-item.active{background:var(--panel-3);color:var(--text);border-color:var(--line);}
  .nav-item .ic{width:16px;height:16px;flex-shrink:0;opacity:.85;}
  .nav-item-label{display:flex;align-items:center;gap:9px;overflow:hidden;}
  .nav-item-label span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .count-pill{
    font-family:var(--font-mono);font-size:11px;color:var(--muted-dim);
    background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:2px 7px;flex-shrink:0;
  }
  .nav-item.active .count-pill{color:var(--accent);border-color:var(--accent-dim);}

  .main{flex:1;min-width:0;padding:20px 22px 60px;}

  /* ---------- player ---------- */
  .player-card{
    background:var(--panel);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:22px;
    box-shadow:var(--shadow-lg);
  }
  .player-stage{
    position:relative;width:100%;aspect-ratio:16/9;background:#000;
    display:flex;align-items:center;justify-content:center;
  }
  .player-stage video{width:100%;height:100%;object-fit:contain;background:#000;}
  .player-empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    color:var(--muted-dim);text-align:center;padding:30px;
  }
  .player-empty svg{width:40px;height:40px;opacity:.5;}
  .player-empty p{margin:0;font-size:14px;}
  .player-empty .hint{font-size:12px;color:var(--muted-dim);}

  .stage-overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:12px;background:rgba(5,6,9,0.78);color:var(--text);text-align:center;padding:20px;
  }
  .spinner{
    width:38px;height:38px;border-radius:50%;
    border:3px solid rgba(255,255,255,0.12);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .stage-overlay p{margin:0;font-size:13px;color:var(--muted);}
  .stage-overlay .err-title{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--text);}
  .stage-overlay .err-detail{font-size:12.5px;color:var(--muted-dim);max-width:340px;}

  .tuning::before{
    content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 3px);
    animation:tuneflicker .45s steps(2) 2;
  }
  @keyframes tuneflicker{
    0%{opacity:1;}50%{opacity:.3;}100%{opacity:0;}
  }

  .live-badge{
    position:absolute;top:12px;left:12px;z-index:6;
    display:flex;align-items:center;gap:6px;
    background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);
    border-radius:999px;padding:5px 10px 5px 8px;
    font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;color:var(--text);
  }
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,59,74,.5);}50%{opacity:.55;box-shadow:0 0 0 4px rgba(255,59,74,0);}}

  .player-meta{
    display:flex;align-items:center;gap:12px;padding:14px 16px;border-top:1px solid var(--line-soft);
  }
  .player-meta img{width:42px;height:42px;border-radius:8px;object-fit:contain;background:var(--panel-2);flex-shrink:0;}
  .player-meta .pm-info{min-width:0;flex:1;}
  .player-meta .pm-name{font-family:var(--font-display);font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .player-meta .pm-group{font-size:12px;color:var(--muted-dim);}
  .player-meta .pm-actions{display:flex;gap:8px;flex-shrink:0;}
  .icon-btn{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--panel-2);
    color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:background .12s,color .12s,border-color .12s;flex-shrink:0;
  }
  .icon-btn:hover{background:var(--panel-3);color:var(--text);}
  .icon-btn.fav-active{color:var(--star);border-color:#5a431a;}
  .icon-btn svg{width:16px;height:16px;}

  /* ---------- categories / toolbar ---------- */
  .view-toolbar{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
  .view-title{font-family:var(--font-display);font-weight:600;font-size:19px;}
  .view-sub{font-family:var(--font-mono);font-size:12px;color:var(--muted-dim);margin-left:8px;}

  .chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;margin-bottom:6px;}
  .chip{
    flex-shrink:0;font-size:12.5px;font-weight:500;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer;
    transition:background .12s,color .12s,border-color .12s;
  }
  .chip:hover{color:var(--text);}
  .chip.active{background:var(--accent);color:#062420;border-color:var(--accent);font-weight:600;}

  /* ---------- grid ---------- */
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:14px;
  }
  .card{
    position:relative;background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);
    padding:10px;cursor:pointer;transition:transform .14s,border-color .14s,background .14s;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--accent-dim);background:var(--panel-2);}
  .card.now-playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;}
  .card-thumb{
    position:relative;width:100%;aspect-ratio:1.5/1;background:var(--panel-2);border-radius:var(--radius-sm);
    display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:9px;
  }
  .card-thumb img{width:72%;height:72%;object-fit:contain;}
  .card-thumb img.logo-fallback{width:38%;height:38%;opacity:.45;}
  .ch-num{
    position:absolute;bottom:5px;left:5px;font-family:var(--font-mono);font-size:10.5px;color:var(--muted);
    background:rgba(0,0,0,0.55);border-radius:5px;padding:1px 5px;letter-spacing:.03em;
  }
  .star-btn{
    position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;border:none;
    background:rgba(8,9,12,0.6);color:var(--muted-dim);display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:color .12s,background .12s;z-index:2;
  }
  .star-btn:hover{background:rgba(8,9,12,0.85);color:var(--star);}
  .star-btn.active{color:var(--star);}
  .star-btn svg{width:14px;height:14px;}
  .card-name{font-size:13px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-group{font-size:11.5px;color:var(--muted-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* skeleton */
  .skel{background:linear-gradient(100deg,var(--panel) 30%,var(--panel-3) 50%,var(--panel) 70%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .skel-thumb{aspect-ratio:1.5/1;border-radius:var(--radius-sm);margin-bottom:9px;}
  .skel-line{height:10px;border-radius:4px;margin-bottom:6px;}
  .skel-card{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);padding:10px;}

  /* empty states */
  .empty-state{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    padding:70px 20px;color:var(--muted-dim);text-align:center;grid-column:1/-1;
  }
  .empty-state svg{width:42px;height:42px;opacity:.4;}
  .empty-state .et-title{font-family:var(--font-display);font-size:16px;color:var(--muted);font-weight:600;}
  .empty-state .et-sub{font-size:13px;max-width:340px;}

  .load-more-wrap{display:flex;justify-content:center;padding:26px 0 6px;}
  .sentinel{height:1px;}

  /* fetch error banner */
  .fetch-error{
    display:flex;gap:14px;align-items:flex-start;background:#1c1316;border:1px solid #3a1f22;border-radius:var(--radius);
    padding:16px 18px;margin-bottom:18px;
  }
  .fetch-error svg{width:22px;height:22px;color:var(--danger);flex-shrink:0;margin-top:1px;}
  .fetch-error .fe-title{font-weight:700;font-size:14px;margin-bottom:4px;}
  .fetch-error .fe-detail{font-size:13px;color:var(--muted);line-height:1.5;}
  .fetch-error .fe-actions{margin-top:10px;display:flex;gap:8px;}

  /* modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(4,5,7,0.7);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);
    width:100%;max-width:440px;padding:22px;box-shadow:var(--shadow-lg);
  }
  .modal h3{font-family:var(--font-display);margin:0 0 4px;font-size:18px;}
  .modal .modal-sub{color:var(--muted-dim);font-size:13px;margin:0 0 18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
  .field input{
    width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
    border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;
  }
  .field input:focus{outline:none;border-color:var(--accent-dim);}
  .field-error{color:var(--danger);font-size:12px;margin-top:6px;display:none;}
  .field-error.show{display:block;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  .playlist-list{margin-top:18px;border-top:1px solid var(--line);padding-top:14px;}
  .playlist-list-title{font-size:12px;color:var(--muted-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-family:var(--font-mono);}
  .pl-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft);}
  .pl-row:last-child{border-bottom:none;}
  .pl-row .pl-name{font-size:13px;font-weight:600;}
  .pl-row .pl-url{font-size:11px;color:var(--muted-dim);font-family:var(--font-mono);max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pl-row .pl-actions{display:flex;gap:6px;}
  .pl-row .pl-actions button{
    background:none;border:none;color:var(--muted-dim);cursor:pointer;font-size:12px;padding:4px 6px;
  }
  .pl-row .pl-actions button:hover{color:var(--text);}
  .pl-builtin-tag{font-family:var(--font-mono);font-size:9.5px;color:var(--accent);border:1px solid var(--accent-dim);border-radius:4px;padding:1px 5px;margin-left:6px;}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel-3);border:1px solid var(--line);color:var(--text);padding:11px 18px;
    border-radius:999px;font-size:13px;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s, transform .2s;
    z-index:200;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* mobile */
  .mobile-tabs{display:none;}
  @media (max-width: 860px){
    .sidebar{display:none;}
    .mobile-tabs{
      display:flex;gap:8px;overflow-x:auto;padding:12px 16px 0;background:var(--bg);
    }
    .mobile-tabs .chip{font-size:12px;}
    .topbar{flex-wrap:wrap;padding:12px 14px;}
    .search-wrap{order:3;flex-basis:100%;max-width:none;}
    .main{padding:14px 14px 50px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
  }
  @media (max-width: 480px){
    .topbar-actions .playlist-select{display:none;}
    .brand-name{font-size:15px;}
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#06231d" stroke-width="2.2"><rect x="3" y="3" width="18" height="14" rx="2"/><path d="M9 20h6M12 17v3" stroke-linecap="round"/></svg>
      </div>
      <div class="brand-name">Sig<span>nal</span></div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" placeholder="Search channels or categories…" autocomplete="off">
      <button class="search-clear" id="searchClear" aria-label="Clear search">✕</button>
    </div>
    <div class="topbar-actions">
      <select class="playlist-select" id="playlistSelect" aria-label="Select playlist"></select>
      <button class="btn" id="addPlaylistBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        Add list
      </button>
    </div>
  </header>

  <div class="mobile-tabs" id="mobileTabs"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">

      <section class="player-card">
        <div class="player-stage" id="playerStage">
          <div class="player-empty" id="playerEmpty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4" stroke-linecap="round"/><path d="M8 9l3 2-3 2V9z"/></svg>
            <p>Pick a channel below to start watching.</p>
            <span class="hint">Live streams from your playlist will play right here.</span>
          </div>
          <video id="video" playsinline style="display:none;"></video>
        </div>
        <div class="player-meta" id="playerMeta" style="display:none;">
          <img id="pmLogo" alt="" />
          <div class="pm-info">
            <div class="pm-name" id="pmName">—</div>
            <div class="pm-group" id="pmGroup">—</div>
          </div>
          <div class="pm-actions">
            <button class="icon-btn" id="pmFav" aria-label="Toggle favorite">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.6 5.6 6.1.8-4.5 4.3 1.2 6-5.4-3-5.4 3 1.2-6L3.3 9.4l6.1-.8L12 3z" stroke-linejoin="round"/></svg>
            </button>
            <button class="icon-btn" id="pmClose" aria-label="Stop playback">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </section>

      <div id="fetchErrorWrap"></div>

      <div class="view-toolbar">
        <div>
          <span class="view-title" id="viewTitle">All Channels</span>
          <span class="view-sub" id="viewSub"></span>
        </div>
      </div>

      <div class="chip-row" id="chipRow"></div>

      <div class="grid" id="grid"></div>
      <div class="sentinel" id="sentinel"></div>
      <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
        <button class="btn" id="loadMoreBtn">Load more channels</button>
      </div>

    </main>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Add a playlist</h3>
    <p class="modal-sub">Paste an M3U / M3U8 playlist URL to add it as a new source.</p>
    <div class="field">
      <label for="plName">Name</label>
      <input id="plName" type="text" placeholder="e.g. My Custom Playlist">
    </div>
    <div class="field">
      <label for="plUrl">Playlist URL</label>
      <input id="plUrl" type="text" placeholder="https://example.com/playlist.m3u">
      <div class="field-error" id="plError">Enter a valid http(s) URL.</div>
    </div>
    <div class="playlist-list" id="playlistList"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">Close</button>
      <button class="btn btn-accent" id="modalSave">Add playlist</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------------- constants ---------------- */
  var DEFAULT_PLAYLIST = { id:'default', name:'IPTV-ORG (Full Index)', url:'https://iptv-org.github.io/iptv/index.m3u', builtIn:true };
  var BATCH_SIZE = 48;
  var RECENT_MAX = 15;
  var FALLBACK_SVG = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%238d94a6" stroke-width="1.6"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4" stroke-linecap="round"/><path d="M8 9l3 2-3 2V9z"/></svg>'
  );

  /* ---------------- state ---------------- */
  var state = {
    playlists: [DEFAULT_PLAYLIST],
    activePlaylistId: 'default',
    channels: [],
    categories: [],
    favorites: [],
    recent: [],
    tab: 'all',          // 'all' | 'favorites' | 'recent' | category name
    query: '',
    renderedCount: 0,
    filtered: [],
    current: null,       // currently playing channel
    loadingPlaylist: true,
    playlistError: null,
    hls: null,
    statusTimeout: null
  };

  /* ---------------- storage helpers ---------------- */
  function hasStorage(){ return typeof window.storage !== 'undefined' && window.storage; }

  function storageGet(key, fallback){
    if(!hasStorage()) return Promise.resolve(fallback);
    return window.storage.get(key, false).then(function(res){
      if(!res || res.value === undefined || res.value === null) return fallback;
      try { return JSON.parse(res.value); } catch(e){ return fallback; }
    }).catch(function(){ return fallback; });
  }
  function storageSet(key, value){
    if(!hasStorage()) return Promise.resolve(null);
    return window.storage.set(key, JSON.stringify(value), false).catch(function(){ return null; });
  }

  /* ---------------- utils ---------------- */
  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function debounce(fn, ms){
    var t; return function(){
      var args = arguments, ctx = this;
      clearTimeout(t);
      t = setTimeout(function(){ fn.apply(ctx, args); }, ms);
    };
  }
  function pad3(n){ return String(n).padStart(3,'0'); }
  function uid(ch){ return ch.url; }
  function isValidUrl(str){
    try { var u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; }
    catch(e){ return false; }
  }
  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2400);
  }

  /* fuzzy-ish match: substring gets best rank, else in-order subsequence */
  function matchScore(text, q){
    if(!q) return 0;
    text = text.toLowerCase();
    var idx = text.indexOf(q);
    if(idx !== -1) return idx; // lower = better, prioritized below subsequence
    // subsequence check
    var ti = 0;
    for(var qi = 0; qi < q.length; qi++){
      ti = text.indexOf(q[qi], ti);
      if(ti === -1) return -1;
      ti++;
    }
    return 1000; // subsequence match, ranks after substring matches
  }

  /* ---------------- M3U parsing ---------------- */
  function parseM3U(text){
    var lines = text.split(/\r?\n/);
    var channels = [];
    var current = null;
    for(var i = 0; i < lines.length; i++){
      var line = lines[i].trim();
      if(!line) continue;
      if(line.charAt(0) === '#'){
        if(line.indexOf('#EXTINF') === 0){
          var colon = line.indexOf(':');
          var rest = colon !== -1 ? line.substring(colon+1) : '';
          var commaIdx = rest.lastIndexOf(',');
          var attrsStr = commaIdx !== -1 ? rest.substring(0, commaIdx) : rest;
          var namePart = commaIdx !== -1 ? rest.substring(commaIdx+1).trim() : '';
          current = {
            name: namePart || 'Unknown Channel',
            logo: '',
            group: 'Uncategorized'
          };
          var logoMatch = attrsStr.match(/tvg-logo="([^"]*)"/i);
          if(logoMatch && logoMatch[1]) current.logo = logoMatch[1];
          var groupMatch = attrsStr.match(/group-title="([^"]*)"/i);
          if(groupMatch && groupMatch[1] && groupMatch[1].trim()) current.group = groupMatch[1].trim();
        }
        continue;
      }
      // non-comment, non-empty line -> treat as URL for the preceding EXTINF
      if(current){
        if(/^https?:\/\//i.test(line)){
          current.url = line;
          channels.push(current);
        }
        current = null;
      }
    }
    // assign stable ids / numbers
    for(var j = 0; j < channels.length; j++){
      channels[j].number = j + 1;
    }
    return channels;
  }

  function buildCategories(channels){
    var map = {};
    for(var i = 0; i < channels.length; i++){
      var g = channels[i].group || 'Uncategorized';
      map[g] = (map[g] || 0) + 1;
    }
    var cats = Object.keys(map).map(function(name){ return { name:name, count: map[name] }; });
    cats.sort(function(a,b){ return a.name.localeCompare(b.name); });
    return cats;
  }

  /* ---------------- fetching playlists ---------------- */
  function fetchPlaylist(playlist){
    state.loadingPlaylist = true;
    state.playlistError = null;
    state.channels = [];
    state.categories = [];
    renderFetchError();
    renderSidebar();
    renderGrid();

    fetch(playlist.url, { cache: 'no-store' }).then(function(res){
      if(!res.ok){
        throw new Error('HTTP ' + res.status + ' ' + res.statusText);
      }
      return res.text();
    }).then(function(text){
      var channels = parseM3U(text);
      if(channels.length === 0){
        throw new Error('No playable entries found in this playlist.');
      }
      state.channels = channels;
      state.categories = buildCategories(channels);
      state.loadingPlaylist = false;
      state.playlistError = null;
      resetView();
      renderSidebar();
      renderMobileTabs();
      renderFetchError();
      applyFilters();
    }).catch(function(err){
      state.loadingPlaylist = false;
      state.playlistError = (err && err.message) ? err.message : 'Unknown error while loading playlist.';
      renderSidebar();
      renderFetchError();
      renderGrid();
    });
  }

  function resetView(){
    state.tab = 'all';
    state.query = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').classList.remove('show');
    state.renderedCount = 0;
  }

  /* ---------------- filtering ---------------- */
  function computeFiltered(){
    var list = state.channels;

    if(state.tab === 'favorites'){
      var favSet = state.favorites;
      list = list.filter(function(c){ return favSet.indexOf(uid(c)) !== -1; });
    } else if(state.tab === 'recent'){
      var order = state.recent;
      var byId = {};
      state.channels.forEach(function(c){ byId[uid(c)] = c; });
      list = order.map(function(id){ return byId[id]; }).filter(Boolean);
    } else if(state.tab !== 'all'){
      list = list.filter(function(c){ return c.group === state.tab; });
    }

    var q = state.query.trim().toLowerCase();
    if(q){
      var scored = [];
      for(var i = 0; i < list.length; i++){
        var c = list[i];
        var s1 = matchScore(c.name, q);
        var s2 = matchScore(c.group, q);
        var best = s1 === -1 ? s2 : (s2 === -1 ? s1 : Math.min(s1, s2));
        if(best !== -1) scored.push({ c:c, score:best });
      }
      scored.sort(function(a,b){ return a.score - b.score; });
      list = scored.map(function(s){ return s.c; });
    }

    state.filtered = list;
  }

  function applyFilters(){
    computeFiltered();
    state.renderedCount = 0;
    renderToolbar();
    renderChipRow();
    renderGrid();
  }

  /* ---------------- rendering: sidebar / tabs ---------------- */
  function navIconAll(){
    return '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>';
  }
  function navIconStar(){
    return '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.6 5.6 6.1.8-4.5 4.3 1.2 6-5.4-3-5.4 3 1.2-6L3.3 9.4l6.1-.8L12 3z" stroke-linejoin="round"/></svg>';
  }
  function navIconClock(){
    return '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2" stroke-linecap="round"/></svg>';
  }

  function renderSidebar(){
    var el = document.getElementById('sidebar');
    var favCount = state.favorites.length;
    var recCount = state.recent.length;
    var totalCount = state.channels.length;

    var html = '';
    html += '<div class="nav-group">';
    html += navItem('all', navIconAll(), 'All Channels', totalCount);
    html += navItem('favorites', navIconStar(), 'Favorites', favCount);
    html += navItem('recent', navIconClock(), 'Recently Watched', recCount);
    html += '</div>';

    if(state.categories.length){
      html += '<div class="nav-group"><div class="nav-label">Categories</div>';
      state.categories.forEach(function(cat){
        html += navItem(cat.name, '', cat.name, cat.count, true);
      });
      html += '</div>';
    }
    el.innerHTML = html;

    el.querySelectorAll('.nav-item').forEach(function(item){
      item.addEventListener('click', function(){
        state.tab = item.getAttribute('data-tab');
        renderSidebar();
        renderMobileTabs();
        applyFilters();
      });
    });
  }

  function navItem(tabKey, icon, label, count, isCategory){
    var active = state.tab === tabKey ? ' active' : '';
    return '<div class="nav-item' + active + '" data-tab="' + esc(tabKey) + '">' +
      '<div class="nav-item-label">' + (icon || '') + '<span>' + esc(label) + '</span></div>' +
      '<span class="count-pill">' + count + '</span></div>';
  }

  function renderMobileTabs(){
    var el = document.getElementById('mobileTabs');
    var tabs = [
      { key:'all', label:'All' },
      { key:'favorites', label:'★ Favorites' },
      { key:'recent', label:'Recent' }
    ];
    var html = tabs.map(function(t){
      var active = state.tab === t.key ? ' active' : '';
      return '<button class="chip' + active + '" data-tab="' + t.key + '">' + esc(t.label) + '</button>';
    }).join('');
    el.innerHTML = html;
    el.querySelectorAll('.chip').forEach(function(chip){
      chip.addEventListener('click', function(){
        state.tab = chip.getAttribute('data-tab');
        renderSidebar();
        renderMobileTabs();
        applyFilters();
      });
    });
  }

  function renderChipRow(){
    var el = document.getElementById('chipRow');
    if(state.tab !== 'all' || !state.categories.length){
      el.innerHTML = '';
      return;
    }
    var html = state.categories.map(function(cat){
      return '<button class="chip" data-cat="' + esc(cat.name) + '">' + esc(cat.name) + ' <span style="opacity:.6">' + cat.count + '</span></button>';
    }).join('');
    el.innerHTML = html;
    el.querySelectorAll('.chip').forEach(function(chip){
      chip.addEventListener('click', function(){
        state.tab = chip.getAttribute('data-cat');
        renderSidebar();
        renderMobileTabs();
        applyFilters();
      });
    });
  }

  function renderToolbar(){
    var titleMap = { all:'All Channels', favorites:'Favorites', recent:'Recently Watched' };
    var title = titleMap[state.tab] || state.tab;
    document.getElementById('viewTitle').textContent = title;
    document.getElementById('viewSub').textContent = state.query ? ('matches for "' + state.query + '"') : (state.filtered.length + ' channels');
  }

  /* ---------------- rendering: grid ---------------- */
  function skeletonGrid(){
    var html = '';
    for(var i = 0; i < 18; i++){
      html += '<div class="skel-card"><div class="skel skel-thumb"></div><div class="skel skel-line" style="width:80%"></div><div class="skel skel-line" style="width:50%"></div></div>';
    }
    return html;
  }

  function emptyStateHtml(){
    if(state.loadingPlaylist) return '';
    if(state.playlistError) return '';
    if(state.tab === 'favorites' && state.filtered.length === 0 && !state.query){
      return emptyBlock('No favorites yet', 'Tap the star on any channel to pin it here for quick access.');
    }
    if(state.tab === 'recent' && state.filtered.length === 0 && !state.query){
      return emptyBlock('Nothing watched yet', 'Channels you play will show up here, most recent first.');
    }
    if(state.filtered.length === 0){
      return emptyBlock('No channels found', state.query ? ('No matches for "' + esc(state.query) + '". Try a different search term.') : 'This category has no channels right now.');
    }
    return null;
  }
  function emptyBlock(title, sub){
    return '<div class="empty-state">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>' +
      '<div class="et-title">' + esc(title) + '</div><div class="et-sub">' + esc(sub) + '</div></div>';
  }

  function cardHtml(ch){
    var id = uid(ch);
    var isFav = state.favorites.indexOf(id) !== -1;
    var isPlaying = state.current && uid(state.current) === id;
    var logo = ch.logo ? esc(ch.logo) : FALLBACK_SVG;
    return '<div class="card' + (isPlaying ? ' now-playing' : '') + '" data-id="' + esc(id) + '">' +
      '<button class="star-btn' + (isFav ? ' active' : '') + '" data-id="' + esc(id) + '" aria-label="Toggle favorite">' +
        '<svg viewBox="0 0 24 24" fill="' + (isFav ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2"><path d="M12 3l2.6 5.6 6.1.8-4.5 4.3 1.2 6-5.4-3-5.4 3 1.2-6L3.3 9.4l6.1-.8L12 3z" stroke-linejoin="round"/></svg>' +
      '</button>' +
      '<div class="card-thumb"><img class="channel-logo" src="' + logo + '" alt="" loading="lazy">' +
        '<span class="ch-num">' + pad3(ch.number) + '</span>' +
      '</div>' +
      '<div class="card-name">' + esc(ch.name) + '</div>' +
      '<div class="card-group">' + esc(ch.group) + '</div>' +
    '</div>';
  }

  function renderGrid(){
    var grid = document.getElementById('grid');
    var loadMoreWrap = document.getElementById('loadMoreWrap');

    if(state.loadingPlaylist){
      grid.innerHTML = skeletonGrid();
      loadMoreWrap.style.display = 'none';
      return;
    }
    if(state.playlistError){
      grid.innerHTML = '';
      loadMoreWrap.style.display = 'none';
      return;
    }

    var empty = emptyStateHtml();
    if(empty){
      grid.innerHTML = empty;
      loadMoreWrap.style.display = 'none';
      return;
    }

    if(state.renderedCount === 0){
      state.renderedCount = Math.min(BATCH_SIZE, state.filtered.length);
    }
    var slice = state.filtered.slice(0, state.renderedCount);
    grid.innerHTML = slice.map(cardHtml).join('');
    bindGridEvents(grid);

    loadMoreWrap.style.display = state.renderedCount < state.filtered.length ? 'flex' : 'none';
  }

  function loadMore(){
    state.renderedCount = Math.min(state.renderedCount + BATCH_SIZE, state.filtered.length);
    renderGrid();
  }

  function bindGridEvents(grid){
    grid.querySelectorAll('img.channel-logo').forEach(function(img){
      img.addEventListener('error', function(){
        if(!img.classList.contains('logo-fallback')){
          img.src = FALLBACK_SVG;
          img.classList.add('logo-fallback');
        }
      }, { once:true });
    });
    grid.querySelectorAll('.star-btn').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        toggleFavorite(btn.getAttribute('data-id'));
      });
    });
    grid.querySelectorAll('.card').forEach(function(card){
      card.addEventListener('click', function(){
        var id = card.getAttribute('data-id');
        var ch = state.channels.find(function(c){ return uid(c) === id; });
        if(ch) playChannel(ch);
      });
    });
  }

  /* ---------------- favorites / recent ---------------- */
  function toggleFavorite(id){
    var idx = state.favorites.indexOf(id);
    if(idx === -1) state.favorites.push(id);
    else state.favorites.splice(idx, 1);
    storageSet('favorites', state.favorites);
    renderSidebar();
    if(state.tab === 'favorites'){ applyFilters(); } else {
      document.querySelectorAll('.star-btn[data-id="' + cssEscape(id) + '"]').forEach(function(btn){
        var active = state.favorites.indexOf(id) !== -1;
        btn.classList.toggle('active', active);
        btn.querySelector('svg').setAttribute('fill', active ? 'currentColor' : 'none');
      });
    }
    if(state.current && uid(state.current) === id){
      syncPlayerFavButton();
    }
  }
  function cssEscape(s){ return String(s).replace(/["\\]/g, '\\$&'); }

  function addToRecent(id){
    var idx = state.recent.indexOf(id);
    if(idx !== -1) state.recent.splice(idx, 1);
    state.recent.unshift(id);
    if(state.recent.length > RECENT_MAX) state.recent.length = RECENT_MAX;
    storageSet('recent', state.recent);
    renderSidebar();
    if(state.tab === 'recent') applyFilters();
  }

  /* ---------------- player ---------------- */
  function destroyPlayer(){
    if(state.hls){ try{ state.hls.destroy(); }catch(e){} state.hls = null; }
    if(state.statusTimeout){ clearTimeout(state.statusTimeout); state.statusTimeout = null; }
    var video = document.getElementById('video');
    video.pause();
    video.removeAttribute('src');
    try{ video.load(); }catch(e){}
    var existingOverlay = document.querySelector('.stage-overlay');
    if(existingOverlay) existingOverlay.remove();
    var liveBadge = document.querySelector('.live-badge');
    if(liveBadge) liveBadge.remove();
  }

  function setStageOverlay(html){
    var stage = document.getElementById('playerStage');
    var existing = stage.querySelector('.stage-overlay');
    if(existing) existing.remove();
    if(!html) return;
    var div = document.createElement('div');
    div.className = 'stage-overlay';
    div.innerHTML = html;
    stage.appendChild(div);
  }

  function setLiveBadge(show){
    var stage = document.getElementById('playerStage');
    var existing = stage.querySelector('.live-badge');
    if(existing) existing.remove();
    if(show){
      var div = document.createElement('div');
      div.className = 'live-badge';
      div.innerHTML = '<span class="live-dot"></span>LIVE';
      stage.appendChild(div);
    }
  }

  function playChannel(ch){
    state.current = ch;
    addToRecent(uid(ch));

    document.getElementById('playerEmpty').style.display = 'none';
    var video = document.getElementById('video');
    video.style.display = 'block';
    document.getElementById('playerMeta').style.display = 'flex';

    document.getElementById('pmName').textContent = ch.name;
    document.getElementById('pmGroup').textContent = ch.group;
    var pmLogo = document.getElementById('pmLogo');
    pmLogo.src = ch.logo || FALLBACK_SVG;
    pmLogo.onerror = function(){ pmLogo.onerror = null; pmLogo.src = FALLBACK_SVG; };
    syncPlayerFavButton();

    var stage = document.getElementById('playerStage');
    stage.classList.add('tuning');
    setTimeout(function(){ stage.classList.remove('tuning'); }, 900);

    setLiveBadge(false);
    setStageOverlay('<div class="spinner"></div><p>Tuning in…</p>');

    destroyPlayer();
    var url = ch.url;

    state.statusTimeout = setTimeout(function(){
      handleStreamError('This channel took too long to respond.');
    }, 16000);

    if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = url;
      var onLoaded = function(){ handleStreamReady(); };
      var onErr = function(){ handleStreamError('The browser could not load this stream.'); };
      video.addEventListener('loadedmetadata', onLoaded, { once:true });
      video.addEventListener('error', onErr, { once:true });
      video.play().catch(function(){});
    } else if(window.Hls && Hls.isSupported()){
      var hls = new Hls({ enableWorker:true });
      state.hls = hls;
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function(){ handleStreamReady(); video.play().catch(function(){}); });
      hls.on(Hls.Events.ERROR, function(evt, data){
        if(data && data.fatal){
          var reason = describeHlsError(data);
          handleStreamError(reason);
        }
      });
    } else {
      handleStreamError('This browser does not support HLS playback.');
    }

    renderGrid();
  }

  function describeHlsError(data){
    if(!data || !data.type) return 'The stream could not be played.';
    if(data.type === 'networkError'){
      if(data.details && /manifestLoadError|levelLoadError/.test(data.details)){
        return 'The stream is unreachable — it may be offline, geo-blocked, or behind an expired link.';
      }
      return 'A network error interrupted this stream.';
    }
    if(data.type === 'mediaError') return 'The video could not be decoded by this browser.';
    return 'This channel is unavailable right now.';
  }

  function handleStreamReady(){
    if(state.statusTimeout){ clearTimeout(state.statusTimeout); state.statusTimeout = null; }
    setStageOverlay(null);
    setLiveBadge(true);
  }

  function handleStreamError(message){
    if(state.statusTimeout){ clearTimeout(state.statusTimeout); state.statusTimeout = null; }
    setLiveBadge(false);
    setStageOverlay(
      '<div class="err-title">Channel unavailable</div>' +
      '<p class="err-detail">' + esc(message || 'This stream could not be loaded.') + '</p>' +
      '<button class="btn btn-accent" id="retryBtn" style="margin-top:6px;">Retry</button>'
    );
    var retry = document.getElementById('retryBtn');
    if(retry) retry.addEventListener('click', function(){ if(state.current) playChannel(state.current); });
  }

  function syncPlayerFavButton(){
    var btn = document.getElementById('pmFav');
    if(!state.current){ btn.classList.remove('fav-active'); return; }
    var active = state.favorites.indexOf(uid(state.current)) !== -1;
    btn.classList.toggle('fav-active', active);
    btn.querySelector('svg').setAttribute('fill', active ? 'currentColor' : 'none');
  }

  function stopPlayback(){
    destroyPlayer();
    state.current = null;
    document.getElementById('video').style.display = 'none';
    document.getElementById('playerMeta').style.display = 'none';
    document.getElementById('playerEmpty').style.display = 'flex';
    renderGrid();
  }

  /* ---------------- fetch error banner ---------------- */
  function renderFetchError(){
    var wrap = document.getElementById('fetchErrorWrap');
    if(!state.playlistError){ wrap.innerHTML = ''; return; }
    wrap.innerHTML =
      '<div class="fetch-error">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01" stroke-linecap="round"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z" stroke-linejoin="round"/></svg>' +
        '<div>' +
          '<div class="fe-title">This playlist could not be loaded</div>' +
          '<div class="fe-detail">' + esc(state.playlistError) + '<br><br>This usually happens when the playlist\'s server does not allow cross-origin (CORS) requests from a browser, when the URL is unreachable, or when the file is empty or malformed. Try a different playlist URL that serves proper CORS headers, or retry in case it was temporary.</div>' +
          '<div class="fe-actions">' +
            '<button class="btn btn-accent" id="retryPlaylistBtn">Retry</button>' +
            '<button class="btn" id="switchPlaylistBtn">Add a different playlist</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('retryPlaylistBtn').addEventListener('click', function(){
      var pl = state.playlists.find(function(p){ return p.id === state.activePlaylistId; });
      if(pl) fetchPlaylist(pl);
    });
    document.getElementById('switchPlaylistBtn').addEventListener('click', openModal);
  }

  /* ---------------- playlist management ---------------- */
  function renderPlaylistSelect(){
    var sel = document.getElementById('playlistSelect');
    sel.innerHTML = state.playlists.map(function(p){
      return '<option value="' + esc(p.id) + '"' + (p.id === state.activePlaylistId ? ' selected' : '') + '>' + esc(p.name) + '</option>';
    }).join('');
  }

  function switchPlaylist(id){
    var pl = state.playlists.find(function(p){ return p.id === id; });
    if(!pl) return;
    state.activePlaylistId = id;
    storageSet('activePlaylistId', id);
    stopPlayback();
    fetchPlaylist(pl);
    renderPlaylistSelect();
  }

  function renderPlaylistList(){
    var el = document.getElementById('playlistList');
    var html = '<div class="playlist-list-title">Your playlists</div>';
    html += state.playlists.map(function(p){
      return '<div class="pl-row">' +
        '<div>' +
          '<div class="pl-name">' + esc(p.name) + (p.builtIn ? '<span class="pl-builtin-tag">DEFAULT</span>' : '') + '</div>' +
          '<div class="pl-url">' + esc(p.url) + '</div>' +
        '</div>' +
        '<div class="pl-actions">' +
          '<button data-use="' + esc(p.id) + '">Use</button>' +
          (p.builtIn ? '' : '<button data-remove="' + esc(p.id) + '">Remove</button>') +
        '</div>' +
      '</div>';
    }).join('');
    el.innerHTML = html;
    el.querySelectorAll('[data-use]').forEach(function(btn){
      btn.addEventListener('click', function(){
        switchPlaylist(btn.getAttribute('data-use'));
        closeModal();
      });
    });
    el.querySelectorAll('[data-remove]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-remove');
        state.playlists = state.playlists.filter(function(p){ return p.id !== id; });
        storageSet('playlists', state.playlists);
        if(state.activePlaylistId === id){
          switchPlaylist('default');
        }
        renderPlaylistList();
        renderPlaylistSelect();
        showToast('Playlist removed');
      });
    });
  }

  function openModal(){
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('plName').value = '';
    document.getElementById('plUrl').value = '';
    document.getElementById('plError').classList.remove('show');
    renderPlaylistList();
  }
  function closeModal(){
    document.getElementById('modalOverlay').classList.remove('show');
  }

  function saveNewPlaylist(){
    var name = document.getElementById('plName').value.trim();
    var url = document.getElementById('plUrl').value.trim();
    var errEl = document.getElementById('plError');
    if(!isValidUrl(url)){
      errEl.textContent = 'Enter a valid http(s) URL.';
      errEl.classList.add('show');
      return;
    }
    if(!name) name = url.replace(/^https?:\/\//,'').split('/')[0];
    var id = 'pl_' + Date.now() + '_' + Math.floor(Math.random()*1000);
    var entry = { id:id, name:name, url:url, builtIn:false };
    state.playlists.push(entry);
    storageSet('playlists', state.playlists);
    renderPlaylistList();
    renderPlaylistSelect();
    document.getElementById('plName').value = '';
    document.getElementById('plUrl').value = '';
    errEl.classList.remove('show');
    showToast('Playlist added — select "Use" to load it');
  }

  /* ---------------- init ---------------- */
  function bindGlobalEvents(){
    document.getElementById('searchInput').addEventListener('input', debounce(function(e){
      state.query = e.target.value;
      document.getElementById('searchClear').classList.toggle('show', !!state.query);
      applyFilters();
    }, 160));
    document.getElementById('searchClear').addEventListener('click', function(){
      state.query = '';
      document.getElementById('searchInput').value = '';
      this.classList.remove('show');
      applyFilters();
    });

    document.getElementById('addPlaylistBtn').addEventListener('click', openModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', function(e){
      if(e.target === this) closeModal();
    });
    document.getElementById('modalSave').addEventListener('click', saveNewPlaylist);
    document.getElementById('playlistSelect').addEventListener('change', function(e){
      switchPlaylist(e.target.value);
    });

    document.getElementById('pmFav').addEventListener('click', function(){
      if(state.current) toggleFavorite(uid(state.current));
    });
    document.getElementById('pmClose').addEventListener('click', stopPlayback);

    document.getElementById('loadMoreBtn').addEventListener('click', loadMore);

    var observer = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting && state.renderedCount < state.filtered.length){
          loadMore();
        }
      });
    }, { rootMargin: '300px' });
    observer.observe(document.getElementById('sentinel'));
  }

  function init(){
    bindGlobalEvents();
    renderSidebar();
    renderMobileTabs();
    renderGrid();
    renderPlaylistSelect();

    Promise.all([
      storageGet('favorites', []),
      storageGet('recent', []),
      storageGet('playlists', null),
      storageGet('activePlaylistId', 'default')
    ]).then(function(results){
      state.favorites = Array.isArray(results[0]) ? results[0] : [];
      state.recent = Array.isArray(results[1]) ? results[1] : [];
      state.playlists = Array.isArray(results[2]) && results[2].length ? results[2] : [DEFAULT_PLAYLIST];
      // make sure default always exists
      if(!state.playlists.some(function(p){ return p.id === 'default'; })){
        state.playlists.unshift(DEFAULT_PLAYLIST);
      }
      state.activePlaylistId = results[3] && state.playlists.some(function(p){ return p.id === results[3]; }) ? results[3] : 'default';

      renderSidebar();
      renderPlaylistSelect();

      var active = state.playlists.find(function(p){ return p.id === state.activePlaylistId; }) || DEFAULT_PLAYLIST;
      fetchPlaylist(active);
    });
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
